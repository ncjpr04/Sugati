<template>
    <div class={overlayClass}>
        <div class="send-modal">
            <div class={iconClass}>{iconText}</div>
            <div class="send-modal-title">{title}</div>
            <div class="send-modal-sub">
                <template lwc:if={isSuccess}>
                    <strong>{recipientLabel}</strong>
                    <template lwc:if={subtitle}>
                        <br>{subtitle}
                    </template>
                    <template lwc:else>
                        <br>Logged to Opportunity Activity History
                    </template>
                </template>
                <template lwc:elseif={isFailure}>
                    {subtitle}
                </template>
                <template lwc:else>
                    {subtitleHtml}
                </template>
            </div>
            <template lwc:if={showOkButton}>
                <button type="button" class={okButtonClass} onclick={handleOk}>
                    {okButtonLabel}
                </button>
            </template>
        </div>
    </div>
</template>

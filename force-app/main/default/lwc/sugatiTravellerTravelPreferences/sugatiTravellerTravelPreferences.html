<template>
    <div class="card">
        <div class="card-header">
            <div class="card-title">Travel Preferences</div>
        </div>
        <div class="card-body">

            <!-- FAVOURITE REGIONS — aggregated by continent -->
            <div class="section-label">Favourite Regions</div>
            <template for:each={continentBars} for:item="continentBar">
                <div key={continentBar.name} class="progress-row">
                    <div class="progress-label">{continentBar.name}</div>
                    <div class="progress-bar-wrap">
                        <div class="progress-bar-fill" style={continentBar.style}></div>
                    </div>
                    <div class="progress-val">{continentBar.pct}%</div>
                </div>
            </template>

            <div class="divider"></div>

            <!-- ACCOMMODATION — unique suppliers, warm chip = confirmed booking -->
            <div class="section-label">Accommodation</div>
            <div class="chips">
                <template for:each={accommodationChips} for:item="accommodationChip">
                    <span key={accommodationChip.name} class={accommodationChip.cls}>
                        {accommodationChip.name}
                    </span>
                </template>
            </div>

            <div class="divider"></div>

            <!-- INTERESTS — placeholder pending field availability -->
            <div class="section-label">Interests &amp; Experiences</div>
            <div class="chips">
                <span class="chip">Coming soon</span>
            </div>

        </div>
    </div>
</template>

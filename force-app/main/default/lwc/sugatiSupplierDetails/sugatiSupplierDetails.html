<template>
  <div class="card">
    <div class="card-header">
      <div class="card-title">Supplier Details</div>
    </div>
    <div class="card-body">
      <div class="info-grid">

        <!-- Row 1 -->
        <div>
          <div class="info-label">Supplier Type</div>
          <div class="info-value">{supplierType}</div>
        </div>
        <div>
          <div class="info-label">Chain / Group</div>
          <div class="info-value">{chainGroup}</div>
        </div>

        <!-- Row 2 -->
        <div>
          <div class="info-label">Address</div>
          <div class="info-value">{address}</div>
        </div>
        <div>
          <div class="info-label">Preferred Rate</div>
          <div class="info-value highlight">N/A</div>
        </div>

        <!-- Row 3 -->
        <div>
          <div class="info-label">Partner Since</div>
          <div class="info-value">{partnerSince}</div>
        </div>
        <div>
          <div class="info-label">Contract Renewal</div>
          <div class="info-value">N/A</div>
        </div>

        <!-- Row 4 -->
        <div>
          <div class="info-label">Commission Rate</div>
          <div class="info-value highlight">{commissionRate}</div>
        </div>
        <div>
          <div class="info-label">Blackout Dates</div>
          <div class="info-value">N/A</div>
        </div>

      </div>
    </div>
  </div>
</template>

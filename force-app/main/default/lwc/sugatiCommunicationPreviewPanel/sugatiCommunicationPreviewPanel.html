<template>
    <div class="preview-layout">
        <div class="preview-vp">
            <div class="preview-topbar">
                <div class="preview-ch-tabs">
                    <button type="button" class={emailTabClass} data-channel="email" onclick={handleChannelTab}>✉ Email</button>
                    <button type="button" class={waTabClass} data-channel="wa" onclick={handleChannelTab}>💬 WhatsApp</button>
                    <button type="button" class={iaTabClass} data-channel="ia" onclick={handleChannelTab}>🔔 In-App</button>
                </div>
                <button type="button" class="preview-back" onclick={handleBack}>← Back to Composer</button>
            </div>

            <template lwc:if={showEmail}>
                <div class="ec-cover-toggle">
                    <label class="ec-cover-label">
                        <input type="checkbox" checked={showCover} onchange={handleCoverToggle} />
                        <span>Show logo &amp; cover image</span>
                    </label>
                </div>
                <div class="email-canvas">
                    <div class={coverHiddenClass}>
                        <div class="ec-cover-img">
                            <div class="ec-cover-overlay">
                                <div class="ec-cover-logo">
                                    <div class="ec-cover-s">S</div>
                                    <div class="ec-cover-brand">SUGATI</div>
                                </div>
                            <div class="ec-cover-tagline">{displaySubject}</div>
                            </div>
                        </div>
                    </div>
                    <div class="ec-hdr">
                        <div class="ec-logo"><span class="ec-logo-dot"></span>S U G A T I</div>
                        <div class="ec-meta">
                            <div><b>From</b> {fromLine}</div>
                            <div><b>To</b> {toLine}</div>
                            <div><b>Re</b> {displaySubject}</div>
                        </div>
                    </div>
                    <div class="ec-att-bar">
                        <span class="ec-att-label">Attachments</span>
                        <template lwc:if={hasPreviewAttachments}>
                            <template for:each={previewAttachmentChips} for:item="chip">
                                <div key={chip.id} class="ec-att-chip">
                                    <div class={chip.iconClass}>{chip.typeLabel}</div>
                                    {chip.name}
                                </div>
                            </template>
                        </template>
                        <template lwc:if={showNoAttachments}>
                            <div class="ec-att-chip">
                                <div class="ec-att-chip-ic gen">GEN</div>No attachments selected
                            </div>
                        </template>
                    </div>
                    <div class="ec-body">
                        <h1 class="ec-h1">{displaySubject}</h1>
                        <p class="ec-p">Preview shows your composed message as it will be sent.</p>
                        <div class="ec-p ec-body-content" lwc:dom="manual"></div>
                        <a href="#" class="ec-cta">View Full Itinerary Online</a>
                        <p class="ec-p ec-sign">Warm regards,<br />Sugati Communication Hub</p>
                    </div>
                </div>
            </template>

            <template lwc:if={showWa}>
                <div class="wa-preview-scene">
                    <div class="wa-scene-body">
                        <div class="wa-bubble">
                            <p>WhatsApp preview is available when WhatsApp channel is enabled.</p>
                        </div>
                    </div>
                </div>
            </template>

            <template lwc:if={showIa}>
                <div class="ia-preview-scene">
                    <div class="ia-scene-body">
                        <div class="ia-notif-card">
                            <div class="ia-nc-body">In-App preview is available when In-App channel is enabled.</div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div class="prev-panel">
            <div class="pp-s">
                <div class="pp-l">Delivery</div>
                <div class={postmarkClass} onclick={handleDeliveryPostmark}>
                    <div class="pp-opt-n">✦ Postmark (tracked)</div>
                    <div class="pp-opt-s">Opened · Delivered · Bounced</div>
                </div>
                <div class={nativeClass} onclick={handleDeliveryNative}>
                    <div class="pp-opt-n">Native Salesforce</div>
                    <div class="pp-opt-s">Sent · Failed only</div>
                </div>
            </div>
            <div class="pp-s">
                <div class="pp-l">Schedule</div>
                <div class="pp-opt on"><div class="pp-opt-n">Send immediately</div></div>
                <div class="pp-opt"><div class="pp-opt-n">Schedule for later</div><div class="pp-opt-s">Pick date and time</div></div>
            </div>
            <div class="pp-s">
                <div class="pp-l">Preview as</div>
                <div class="pp-opt on"><div class="pp-opt-n">Hiroshi Yamamura</div></div>
                <div class="pp-opt"><div class="pp-opt-n">Akemi Yamamura</div></div>
            </div>
            <div class="prev-send-zone">
                <button type="button" class={sendBtnClass} onclick={handleSendNow}>
                    <span>Send Now</span><span class="send-arr">→</span>
                </button>
                <div class="send-sec">
                    <div class="send-sec-btn" onclick={handleBack}>← Edit</div>
                    <div class="send-sec-btn" onclick={handleSaveDraft}>Save Draft</div>
                </div>
            </div>
        </div>

        <c-sugati-communication-send-modal
            is-open={sendModalOpen}
            phase={sendPhase}
            title={sendTitle}
            subtitle={sendSubtitle}
            recipient-label={toLine}
            oncomplete={handleSendComplete}
        ></c-sugati-communication-send-modal>
    </div>
</template>

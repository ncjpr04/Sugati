<template>
    <div class="app">
        <header class="topbar">
            <div class="brand"><span class="brand-pip"></span>Sugati</div>
            <nav class="topbar-nav">
                <div class={hubNavClass} onclick={handleViewHub}>Communication Hub</div>
                <div class={newMsgNavClass} onclick={handleNewMessage}>Channel Selector</div>
                <div class={emailNavClass} onclick={handleViewEmail}>Email Composer</div>
                <div class={waNavClass} onclick={handleViewWa}>WhatsApp</div>
                <div class={iaNavClass} onclick={handleViewIa}>In-App</div>
                <div class={tokensNavClass} onclick={handleViewTokens}>Merge Tokens</div>
                <div class={historyNavClass} onclick={handleViewHistory}>History</div>
            </nav>
        </header>

        <div class="ctx-band">
            <div class="ctx-trip">{tripName} — <em>{tripSubtitle}</em></div>
            <div class="ctx-tags">
                <span class="tag tag-green">● Active</span>
                <span class="tag tag-sand">B2C</span>
            </div>
            <div class="ctx-sep"></div>
            <span class="ctx-date">{contextSummary}</span>
            <div class="ctx-right">
                <div class="ctx-stat">
                    <div class="ctx-stat-n ok">{stats.sent}</div>
                    <div class="ctx-stat-l">Sent</div>
                </div>
                <div class="ctx-stat">
                    <div class="ctx-stat-n go">{stats.delivered}</div>
                    <div class="ctx-stat-l">Delivered</div>
                </div>
                <div class="ctx-stat">
                    <div class="ctx-stat-n info">{stats.opened}</div>
                    <div class="ctx-stat-l">Opened</div>
                </div>
                <div class="ctx-stat">
                    <div class="ctx-stat-n muted">{stats.draft}</div>
                    <div class="ctx-stat-l">Draft</div>
                </div>
                <div class="ctx-action">
                    <button type="button" class="btn btn-primary" onclick={handleNewMessage}>＋ New Message</button>
                </div>
            </div>
        </div>

        <div class="pages">
            <div class={hubPageClass}>
                <c-sugati-communication-history
                    display-mode="hub"
                    opportunity-id={effectiveOpportunityId}
                    draft-count={stats.draft}
                    refresh-key={historyRefreshKey}
                    trip-title={tripName}
                    trip-subtitle={tripSubtitle}
                    onchannelnav={handleHistoryChannelNav}
                    oncontinuedraft={handleContinueDraft}
                ></c-sugati-communication-history>
            </div>

            <template lwc:if={showChannel}>
                <div class="page on">
                    <c-sugati-communication-channel-selector
                        onchannelselect={handleChannelSelect}
                    ></c-sugati-communication-channel-selector>
                </div>
            </template>

            <template lwc:if={showEmail}>
                <div class="page on">
                    <c-sugati-communication-email-composer
                        opportunity-id={effectiveOpportunityId}
                        draft-for-edit={draftForEdit}
                        trip-name={tripName}
                        stage-label={stageLabel}
                        open-with-template-picker={emailOpenWithTemplatePicker}
                        onnavigaterecipients={handleNavigateRecipients}
                        onnavigatepreview={handleNavigatePreview}
                        onopentemplates={handleOpenTemplatePicker}
                        onnavigatetokens={handleEmailNavigateTokens}
                        ondraftsaved={handleDraftSaved}
                        ondraftdiscarded={handleDraftDiscarded}
                    ></c-sugati-communication-email-composer>
                </div>
            </template>

            <template lwc:if={showWa}>
                <div class="page on">
                    <c-sugati-communication-whatsapp-composer
                        onnavigatepreview={handleNavigatePreview}
                    ></c-sugati-communication-whatsapp-composer>
                </div>
            </template>

            <template lwc:if={showIa}>
                <div class="page on">
                    <c-sugati-communication-in-app-composer
                        onnavigatepreview={handleNavigatePreview}
                    ></c-sugati-communication-in-app-composer>
                </div>
            </template>

            <template lwc:if={showRecipients}>
                <div class="page on">
                    <c-sugati-communication-recipient-selector
                        opportunity-id={effectiveOpportunityId}
                        selected-ids={selectedRecipientIds}
                        onapply={handleRecipientsApply}
                        onback={handleRecipientsBack}
                    ></c-sugati-communication-recipient-selector>
                </div>
            </template>

            <template lwc:if={showPreview}>
                <div class="page on">
                    <c-sugati-communication-preview-panel
                        opportunity-id={effectiveOpportunityId}
                        initial-channel={previewChannel}
                        preview-payload={previewPayload}
                        onback={handlePreviewBack}
                        onsent={handleSent}
                        ondraftsaved={handleDraftSaved}
                    ></c-sugati-communication-preview-panel>
                </div>
            </template>

            <template lwc:if={showHistory}>
                <div class="page on">
                    <c-sugati-communication-history
                        display-mode="history"
                        opportunity-id={effectiveOpportunityId}
                        refresh-key={historyRefreshKey}
                        trip-title={tripName}
                        trip-subtitle={tripSubtitle}
                        onchannelnav={handleHistoryChannelNav}
                        oncontinuedraft={handleContinueDraft}
                    ></c-sugati-communication-history>
                </div>
            </template>

            <template lwc:if={showTokens}>
                <div class="page on">
                    <c-sugati-communication-merge-field-picker
                        opportunity-id={effectiveOpportunityId}
                        onback={handleTokensBack}
                        ontokeninsert={handleTokensInsert}
                    ></c-sugati-communication-merge-field-picker>
                </div>
            </template>
        </div>

        <template lwc:if={showTemplatePicker}>
            <c-sugati-communication-template-picker
                opportunity-id={effectiveOpportunityId}
                trip-name={tripName}
                stage-label={stageLabel}
                onclose={handleCloseTemplatePicker}
                onselect={handleTemplatePickerSelect}
            ></c-sugati-communication-template-picker>
        </template>
    </div>
</template>
